# Pathos configuration
# Copy to ~/.pathos/config.yml and uncomment to customize.
# All values below show the defaults — only uncomment what you want to change.

# Model used for the fast triage scan (flags potential issues, runs every poll cycle)
# triage_model: claude-haiku-4-5-20251001

# Model used for deep validation (investigates flagged issues before interrupting)
# validate_model: claude-opus-4-7

# How often the supervisor checks for new agent activity (seconds)
# poll_interval: 60

# Poll interval when running with PATHOS_DEBUG=1
# debug_poll_interval: 5

# Sound played when a critical issue is confirmed and injected
# Set to "" to disable
# alert_command: afplay /System/Library/Sounds/Sosumi.aiff

# Additional sound played when a pathos session ends (via tmux hook)
# Plays alongside Claude's own stop sound, not instead of it
# Set to a sound file path to enable, omit to disable
# stop_sound: /System/Library/Sounds/Tink.aiff
